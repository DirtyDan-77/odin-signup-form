<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-container">
        <div class="img-panel">
            <img src="/sasha-yudaev-unsplash.jpg" alt="geometrical spiral image">
        </div>
        <div class="form-panel">
            <div class="form-header">
                <p>
                    This is not a real online service! 
                    You know you need something like this in your life to help you realize your deepest dreams.
                    Sign up <em>now</em> to get started.
                </p>
                <p>
                    You <em>know</em> you want to.
                </p>
            </div>
           
            <form action="/signup" method="post">
                <div class="form-group">
                    <div class="form-group-title">Let's do this!</div>
                    <div class="form-row">
                        <div class="form-field">
                            <label for="first_name">FIRST NAME</label>
                            <input type="text" name="first_name" id="first_name">
                        </div>
                        <div class="form-field">
                            <label for="last_name">LAST NAME</label>
                            <input type="text" name="last_name" id="last_name">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-field">
                            <label for="email">EMAIL</label>
                            <input type="email" name="email" id="email">
                        </div>
                        <div class="form-field">
                            <label for="phone">PHONE NUMBER</label>
                            <input type="tel" name="phone" id="phone">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-field">
                            <label for="password_entry">PASSWORD</label>
                            <input type="password" name="password_entry" id="password_entry" required>
                        </div>
                        <div class="form-field">
                            <label for="password_confirmation">CONFIRM PASSWORD</label>
                            <input type="password" name="password_confirmation" id="password_confirmation" required>
                        </div>
                    </div>
                </div>
                <div class="form-footer">
                    <button type="submit">Create Account</button>

                    <p>Already have an account?
                    <span class="login-link">Log in</span>
                    </p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
